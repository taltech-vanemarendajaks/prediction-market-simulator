name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  sanity:
    name: Repo sanity check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository structure
        run: |
          test -f README.md
          test -d backend
          test -d frontend
          test -d docs

      - name: CI placeholder
        run: echo "CI is configured. Backend and frontend checks will be added next."